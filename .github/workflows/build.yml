name: Build GLYPH (multi-arch)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang make

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: echo "clang & make already available on macOS runner"

      - name: Build
        run: make clean && make

      - name: Show binary info
        run: file glyph-* || true

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: glyph-${{ runner.os }}-${{ runner.arch }}
          path: glyph-*
